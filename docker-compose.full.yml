# ============================================
# Docker Compose 部署文件
# 支持三种模式：
#   1. combined（合并部署，自带 PostgreSQL）
#   2. external-db（合并部署，使用外部数据库）
#   3. separate（分开部署，原架构）
# ============================================
# 使用方式：
#   # 合并部署（自带 PostgreSQL + Redis）
#   docker compose -f docker-compose.full.yml --profile combined up -d
#
#   # 合并部署（仅 App + Redis，使用外部数据库）
#   # 需先修改下方 app-external 的 ConnectionStrings__Default 为你的数据库地址
#   docker compose -f docker-compose.full.yml --profile external-db up -d
#
#   # 分开部署（前后端独立镜像，与旧 docker-compose.yml 行为一致）
#   docker compose -f docker-compose.full.yml --profile separate up -d
# ============================================

services:
  # -------------------------
  # 基础服务：PostgreSQL
  # -------------------------
  postgres:
    profiles:
      - combined
      - separate
    image: postgres:16-alpine
    container_name: ai-forward-pg
    environment:
      POSTGRES_DB: ai_forward
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # 基础服务：Redis
  # -------------------------
  redis:
    profiles:
      - combined
      - external-db
      - separate
    image: redis:7-alpine
    container_name: ai-forward-redis
    command: redis-server --requirepass 123456
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "123456", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # 模式 A：合并部署（自带 PostgreSQL）
  #   激活方式：--profile combined
  # ============================================
  app:
    profiles:
      - combined
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-forward-app
    image: docker.cnb.cool/vxlife/apiswitch/apiswitch-all:latest
    ports:
      - "5000:8080"   # API 端口（后端接口）
      - "80:8080"     # 前端端口（Web 页面）
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ai_forward;Username=postgres;Password=postgres;Timezone=UTC
      - Redis__Configuration=redis:6379,password=123456
      - Redis__InstanceName=ai-forward
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # 模式 B：合并部署（使用外部数据库，不启动 PostgreSQL）
  #   激活方式：--profile external-db
  #   注意：使用前请修改下方 ConnectionStrings__Default 为你自己的数据库地址
  # ============================================
  app-external:
    profiles:
      - external-db
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-forward-app-external
    image: docker.cnb.cool/vxlife/apiswitch/apiswitch-all:latest
    ports:
      - "5000:8080"   # API 端口（后端接口）
      - "80:8080"     # 前端端口（Web 页面）
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      # TODO: 修改为你的外部数据库连接字符串
      - ConnectionStrings__Default=Host=YOUR_DB_HOST;Port=5432;Database=ai_forward;Username=YOUR_USER;Password=YOUR_PASSWORD;Pooling=true;Maximum Pool Size=100;Timezone=UTC
      - Redis__Configuration=redis:6379,password=123456
      - Redis__InstanceName=ai-forward
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # 模式 C：分开部署（前后端独立镜像，原架构）
  #   激活方式：--profile separate
  # ============================================
  backend:
    profiles:
      - separate
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-forward-backend
    image: docker.cnb.cool/vxlife/apiswitch/apiswitch-api:latest
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=ai_forward;Username=postgres;Password=postgres;Timezone=UTC
      - Redis__Configuration=redis:6379,password=123456
      - Redis__InstanceName=ai-forward
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles:
      - separate
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-forward-frontend
    image: docker.cnb.cool/vxlife/apiswitch/apiswitch-ui:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data: